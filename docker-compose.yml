version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.4.1
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: abfip_user
      POSTGRES_PASSWORD: abfip_password
      POSTGRES_DB: abfip_db
    ports: ["5432:5432"]

  jobmanager:
    image: flink:1.17.1-scala_2.12
    ports: ["8081:8081"]
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1024m

  taskmanager:
    image: flink:1.17.1-scala_2.12
    depends_on: [jobmanager]
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 1024m

  transaction-generator:
    build: ./transaction-generator
    restart: always
    environment:
      KAFKA_BROKER: kafka:29092
      TPS: 100
      FRAUD_RATE: 0.05
    depends_on: [kafka]

  ml-engine:
    build: ./ml-engine
    restart: always
    environment:
      KAFKA_BROKER: kafka:29092
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on: [kafka]

  flink-jobs:
    build: ./flink-jobs
    environment:
      KAFKA_BROKER: kafka:29092
    depends_on: [kafka, jobmanager]

  fraud-api:
    build: ./fraud-api
    restart: always
    ports: ["8000:8000"]
    environment:
      KAFKA_BROKER: kafka:29092
      DATABASE_URL: postgresql://abfip_user:abfip_password@postgres:5432/abfip_db
    depends_on: [kafka, postgres]

  dashboard:
    build: ./dashboard
    ports: ["3000:5173"]
    environment:
      VITE_API_URL: http://fraud-api:8000
    depends_on: [fraud-api]
